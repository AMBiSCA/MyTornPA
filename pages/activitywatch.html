<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyTornPA - Faction Activity Peeper</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/activitywatch.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="main-content-wrapper">
        <img src="../images/manwithgun.png" alt="Decorative Glow" class="image-glow">
        <img src="../images/manwithgun.png" alt="Decorative Glow Flipped" class="image-glow-flipped">

        <div class="activity-peeper-tool-container">
            <h2 class="script-title">Faction Activity Peeper.</h2>
            <div class="input-group">
                <div class="input-field">
                    <label for="profileId">Profile ID:</label>
                    <input type="text" id="profileId" placeholder="Enter your Profile ID" />
                    <div id="profileIdError" class="error-message"></div>
                </div>
                <div class="input-field">
                    <label for="tornStatsApiKey">Torn API Key:</label>
                    <input type="text" id="tornStatsApiKey" placeholder="Enter your Torn API Key" />
                    <div id="tornStatsApiKeyError" class="error-message"></div>
                </div>
                <div class="input-field">
                    <label for="myFaction">My Faction:</label>
                    <input type="text" id="myFaction" placeholder="Enter your faction name or ID" />
                </div>
                <div class="input-field">
                    <label for="enemyFaction">Enemy Faction:</label>
                    <input type="text" id="enemyFaction" placeholder="Enter the enemy faction name or ID" />
                </div>
            </div>

            <div class="interval-selector">
                <label for="interval">Update Interval:</label>
                <select id="interval">
                    <option value="15">15 minutes</option>
                    <option value="30" selected>30 minutes</option>
                </select>
                <p>Current Interval: <span id="currentInterval">30 minutes</span></p>
            </div>

            <div class="action-buttons">
                <button id="fetchActivity" class="fetch-btn">Fetch Activity</button>
                <button id="stopActivity" class="fetch-btn">Stop Activity</button>
                <button id="clearData" class="fetch-btn">Clear Data</button>
            </div>
            <div id="activityLogs">
            </div>
        </div>
    </div> 

    <div id="footer-placeholder"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="../js/firebase-init.js"></script>
    
    <script src="../js/loadComponents.js"></script> 
    
    <script src="../js/globalheader.js"></script> 
    
    <script src="../js/activitywatch.js"></script>
</body>
</html>
