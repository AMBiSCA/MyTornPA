<div id="tornpa-chat-system">
    <div id="chat-bar-collapsed">
	
        <div id="open-faction-chat-icon" class="chat-bar-icon" title="faction-Chat">🤝</div>
		<div id="open-war-chat-icon" class="chat-bar-icon" title="war-Chat">⚔️</div>
        <div id="open-friends-icon" class="chat-bar-icon" title="Friends">👥</div>
        <div id="open-notifications-icon" class="chat-bar-icon" title="Notifications">🔔</div>
        <div id="open-settings-icon" class="chat-bar-icon" title="Settings">⚙️</div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-main-tabs-container hidden">
            <div id="dynamic-tabs-container"></div> 
            <div id="static-tabs-container">
                <button class="chat-tab active" data-tab-target="faction-chat-panel" title="Faction Chat">💬</button>
                <button class="chat-tab" data-tab-target="war-chat-panel" title="War Chat">⚔️</button>
                <button class="chat-tab" data-tab-target="friends-panel" title="Friends">👥</button>
                <button class="chat-tab" data-tab-target="notifications-panel" title="Notifications">🔔</button>
                <button class="chat-tab" data-tab-target="settings-panel" title="Settings">⚙️</button>
            </div>
        </div>

        <div class="chat-panels-container">
            <div id="faction-chat-panel" class="chat-panel active">
                <div class="chat-header">
                    <span class="chat-title">Faction Chat</span>
                    <button class="minimize-chat-btn">-</button>
                </div>
                <div id="chat-display-area" class="chat-messages-scroll-wrapper"></div>
                <div id="chat-input-area" class="chat-input-area">
                    <input type="text" class="chat-text-input" placeholder="Type your message...">
                    <button class="chat-send-btn">Send</button>
                </div>
            </div>

            <div id="war-chat-panel" class="chat-panel hidden">
                <div class="chat-header">
                    <span class="chat-title">War Chat</span>
                    <button class="minimize-chat-btn">-</button>
                </div>
                <div id="war-chat-display-area" class="chat-messages-scroll-wrapper"></div>
                <div id="war-chat-input-area" class="chat-input-area">
                    <input type="text" class="chat-text-input" placeholder="Type your message...">
                    <button class="chat-send-btn">Send</button>
                </div>
            </div>

            <div id="friends-panel" class="chat-panel hidden">
                <div class="chat-header"> <span class="chat-title">Friends</span>
                    <button class="minimize-chat-btn">-</button>
                </div>
                <div class="friends-panel-subtabs">
                    <button class="sub-tab-button active" data-subtab="recent-chats" title="Recent Chats">✉️</button>
                    <button class="sub-tab-button" data-subtab="recently-met" title="Recently Met">👋</button>
                    <button class="sub-tab-button" data-subtab="faction-members" title="Faction Members">🏰</button>
                    <button class="sub-tab-button" data-subtab="friend-list" title="Friend List">👤</button>
                    <button class="sub-tab-button" data-subtab="ignore-list" title="Ignore List">🚫</button>
                </div>
                <div class="friends-panel-search">
                    <input type="text" class="search-input" placeholder="Search by player name...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="friends-panel-content">
                    <p style="text-align: center; color: #888; padding-top: 20px;">Content will be loaded here.</p>
                </div>
            </div>

            <div id="notifications-panel" class="chat-panel hidden">
                <div class="chat-header"> <span class="chat-title">Notifications</span>
                    <button class="minimize-chat-btn">-</button>
                </div>
                <div class="notifications-content-wrapper">
                    <div class="notification-section site-notifications">
                        <h4>Site Notifications 🌐</h4>
                        <div class="notification-list" id="site-notification-list">
                            <p>No new site notifications.</p>
                        </div>
                    </div>
                    <div class="notification-section friend-notifications">
                        <h4>Friend Notifications 👥</h4>
                        <div class="notification-list" id="friend-notification-list">
                            <p>No new friend notifications.</p>
                        </div>
                    </div>
                    <div class="notification-section general-notifications">
                        <h4>Other Notifications 🔔</h4>
                        <div class="notification-list" id="general-notification-list">
                            <p>No other notifications.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="settings-panel" class="chat-panel hidden">
                <div class="chat-header"> <span class="chat-title">Settings</span>
                    <button class="minimize-chat-btn">-</button>
                </div>
                <div style="padding:20px; color:white;">
                    <h3>Settings content will go here.</h3>
                </div>
            </div>
        </div>
    </div>
</div>
