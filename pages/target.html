<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Torn Fair Fight Finder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>Torn Fair Fight Finder</h1>

  <label for="apiKey">Enter your Torn API key:</label>
  <input type="text" id="apiKey" placeholder="Your API key here" />

  <label>
    <input type="checkbox" id="anonymous" />
    Share my stats anonymously
  </label>

  <div class="buttons">
    <button onclick="submitStats()">Submit My Stats</button>
    <button onclick="findMatches()">Find Fair Fights</button>
    <button onclick="goToProfile()">Go to My Torn Profile</button>
  </div>

  <div id="results"></div>

  <script src="script.js"></script>
</body>
</html>
