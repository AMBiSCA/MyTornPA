<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MyTornPA</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        /* Basic styling for the login form */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 200px); /* Adjust based on header/footer height */
            padding: 20px;
            box-sizing: border-box;
        }
        .login-box {
            background-color: #2a2a2a; /* Darker background for the box */
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            color: #ccc;
            margin-bottom: 20px;
        }
        .login-box input {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #333;
            color: #eee;
        }
        .login-box button {
            background-color: #007bff; /* A nice blue for the button */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .login-box button:hover {
            background-color: #0056b3;
        }
        .login-box .error-message {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="#" id="headerLogoLink" style="text-decoration: none;">
                <h1>MyTornPA.📝 <span class="tagline">Your Personal Assistant!</span></h1>
            </a>
        </div>
        <div class="header-center">
            <img src="../images/Header.jpg" alt="MyTornPA Logo" id="headerMainLogo">
        </div>
        <div class="header-right-controls">
            <div class="header-buttons" id="headerButtonsContainer" style="display: none;">
                <button class="btn" id="homeButtonHeader" onclick="window.location.href='home.html'">
                    <span class="btn-text">Home:</span><span class="btn-icon">🏠</span>
                </button>
            </div>
        </div>
    </header>

    <div class="main-content-wrapper login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <form id="adminLoginForm">
                <input type="email" id="adminEmail" placeholder="Admin Email" required>
                <input type="password" id="adminPassword" placeholder="Password" required>
                <button type="submit">Login</button>
                <div id="loginError" class="error-message"></div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="home.html" id="homeButtonFooter">Home</a>
            <a href="FAQ.html">F.A.Q</a>
            <a href="Terms.html">Disclaimer & Terms</a>
            <a href="report.html">Report an Issue</a>
            <a href="about.html">About Us</a>
            <a href="https://wiki.torn.com/wiki/Main_Page" target="_blank" rel="noopener noreferrer">Torn Wiki</a>
            <a href="https://www.torn.com/index.php" target="_blank" rel="noopener noreferrer">Torn City</a>
        </div>
        <p>© 2025 MyTornPA — Made for Torn players, by Torn players.</p>
    </footer>

    <script src="../js/firebase-init.js"></script>
    <script src="../js/admin_auth.js"></script>
</body>
</html>
